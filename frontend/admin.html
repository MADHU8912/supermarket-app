<h1>Admin Dashboard</h1>

<button onclick="loadOrders()">Load Orders</button>

<div id="orders"></div>

<script>
const API = "http://localhost:3000";

function loadOrders() {
    fetch(`${API}/api/admin/orders`)
    .then(res => res.json())
    .then(data => {
        document.getElementById("orders").innerHTML =
            data.map(o => `
                <p>Order ID: ${o.id}</p>
            `).join("");
    });
}
</script>
